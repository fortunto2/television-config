[metadata]
name = "claude-history"
description = "Full Claude Code history (all time, 6+ months) with preview"
requirements = ["python3"]

[source]
command = "tv-claude-history"
display = "{split:\t:0}  {split:\t:1}  {split:\t:3}"
output = "{split:\t:3}"
no_sort = true
frecency = false

[preview]
command = "tv-claude-history-preview '{split:\t:2}'"
env = {}

[ui]
preview_panel = { header = "{split:\t:0}  {split:\t:1}" }
