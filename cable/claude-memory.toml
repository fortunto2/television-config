[metadata]
name = "claude-memory"
description = "Search all Claude Code memory: CLAUDE.md, auto-memory, rules"
requirements = ["bat"]

[source]
command = "tv-claude-memory"
display = "{split:\t:0}  {split:\t:2}"
output = "{split:\t:1}"

[preview]
command = "bat -n --color=always '{split:\t:1}'"
env = { BAT_THEME = "ansi" }

[ui]
preview_panel = { header = "{split:\t:0}" }

[keybindings]
enter = "actions:edit"

[actions.edit]
description = "Open file in editor"
command = "${EDITOR:-vim} '{split:\t:1}'"
shell = "bash"
mode = "execute"
